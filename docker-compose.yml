services:
  ytdl-manager:
    build: .
    container_name: ytdl-manager
    restart: unless-stopped
    ports:
      - "8911:8080"
    volumes:
      - ytdl-data:/data
      - /mnt/nas/video/ytdl-manager:/downloads
    environment:
      - TZ=America/Los_Angeles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
        resources:
            limits:
                cpus: '2.0'
                memory: 2G

volumes:
  ytdl-data:
    external: true
    name: ytdl-manager_ytdl-data
